apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'template-service'
        static_configs:
          - targets: ['template-service:8080']
        metrics_path: /actuator/prometheus
      - job_name: 'kafka-exporter'
        static_configs:
          - targets: ['kafka:9308']
      - job_name: 'postgres-exporter'
        static_configs:
          - targets: ['postgres:9187']
      - job_name: 'artemis-exporter'
        static_configs:
          - targets: ['artemis:9404']
